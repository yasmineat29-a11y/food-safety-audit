<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Safety Audit Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f4f4f4; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        
        /* Color Palette Classes */
        .score-green { color: green; font-weight: bold; }
        .score-yellow { color: orange; font-weight: bold; }
        .score-red { color: red; font-weight: bold; }
        
        .btn-container { display: flex; gap: 10px; margin-top: 10px; }
        canvas { max-width: 400px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Food Safety Audit Report</h1>
        <h3>Current Score: <span id="finalScore" class="score-green">100</span>%</h3>
        <div class="btn-container">
            <button onclick="exportData()">Export Data (JSON)</button>
            <button onclick="window.print()">Print Report</button>
        </div>
    </div>

    <div class="card" style="overflow-x: auto;">
        <table id="auditTable">
            <thead>
                <tr>
                    <th>Requirement</th>
                    <th>Result</th>
                    <th>Team</th>
                    <th>Major?</th>
                    <th>Finding</th>
                    <th>Image</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

<script>
const auditItems = [
    {req: "Boundaries of the site/facilities: Identified and maintained to prevent contamination."},
    {req: "Environment: Consideration of potential contamination sources from local environment."},
    {req: "Construction and layout: Designed for purpose, maintained to avoid hazards."},
    {req: "General: Facilities designed to minimize cross-contamination, provide flow, and facilitate hygiene."},
    {req: "Internal structures and fittings: Suitable materials, maintainable, prevent foreign matter/pests."}
    // ... add remaining items here
];

function buildTable() {
    const tbody = document.getElementById('tableBody');
    auditItems.forEach((item, index) => {
        tbody.innerHTML += `<tr>
            <td>${item.req}</td>
            <td><select onchange="calculate()" class="res"><option value="0">Yes</option><option value="1">No</option><option value="0">NA</option></select></td>
            <td><select><option>Kitchen</option><option>Warehouse</option><option>Maintenance</option></select></td>
            <td><input type="checkbox" class="major" onchange="calculate()"></td>
            <td><textarea></textarea></td>
            <td><input type="file" accept="image/*"></td>
        </tr>`;
    });
}

function calculate() {
    let score = 100;
    document.querySelectorAll('.res').forEach(s => { if(s.value == "1") score -= 10; });
    document.querySelectorAll('.major:checked').forEach(() => score -= 10);
    
    let el = document.getElementById('finalScore');
    el.innerText = Math.max(0, score);
    
    // Traffic Light System
    el.className = score >= 90 ? 'score-green' : (score >= 70 ? 'score-yellow' : 'score-red');
}

// Export functionality explanation:
// It takes your audit progress (scores, findings) and turns it into a JSON file 
// you can download to your computer. You can upload this file later to restore your work.
function exportData() {
    alert("Exporting current audit progress to .json file for your records.");
    const blob = new Blob([JSON.stringify({score: document.getElementById('finalScore').innerText})], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'audit-backup.json';
    a.click();
}

buildTable();
</script>
</body>
</html>
