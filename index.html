<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 22002 Audit Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #008080; color: white; }
        .major-input { text-align: center; }
        .chart-container { display: flex; gap: 20px; flex-wrap: wrap; }
        canvas { max-width: 400px; }
        .score-box { font-size: 24px; font-weight: bold; color: #008080; }
    </style>
</head>
<body>

<div class="card">
    <h1>Food Safety Audit Report</h1>
    <div class="score-box">Final Score: <span id="finalScore">100</span>%</div>
</div>

<div class="card">
    <table id="auditTable">
        <thead>
            <tr>
                <th>Category</th>
                <th>Requirement</th>
                <th>Arabic</th>
                <th>Result</th>
                <th>Team</th>
                <th>Major?</th>
                <th>Finding/Action</th>
                <th>Image</th>
                <th>Clause</th>
            </tr>
        </thead>
        <tbody id="auditBody"></tbody>
    </table>
</div>

<div class="card">
    <h3>Trend & Team Performance</h3>
    <div class="chart-container">
        <canvas id="trendChart"></canvas>
        <canvas id="teamChart"></canvas>
    </div>
</div>

<script>
const auditData = [
    { cat: "Food Environment", req: "Boundaries of the site/facilities: Identified and maintained to prevent contamination.", ar: "حدود الموقع/المرافق: يجب تحديدها وصيانتها لمنع التلوث.", clause: "4.1" },
    { cat: "Food Environment", req: "Environment: Consideration of potential contamination sources from local environment.", ar: "البيئة: مراعاة مصادر التلوث المحتملة من البيئة المحلية.", clause: "4.2" },
    { cat: "Food Environment", req: "Construction and layout: Designed for purpose, maintained to avoid hazards.", ar: "البناء والتصميم: تصميم المباني للغرض من العملية، وصيانتها لتجنب المخاطر.", clause: "4.3" },
    { cat: "Food Handling Area", req: "General: Facilities designed to minimize cross-contamination, provide flow, and facilitate hygiene.", ar: "عام: تصميم المرافق لتقليل التلوث المتبادل، وتوفير التدفق المناسب، وتسهيل الظروف الصحية.", clause: "" },
    { cat: "Food Handling Area", req: "Internal structures and fittings: Suitable materials, maintainable, prevent foreign matter/pests.", ar: "الهياكل الداخلية والتجهيزات: مواد مناسبة، قابلة للصيانة، تمنع دخول الأجسام الغريبة/الآفات.", clause: "5.2" },
    { cat: "Food Equipment", req: "Location of equipment: Facilitate hygiene, monitoring, and access.", ar: "موقع المعدات: تسهيل الممارسات الصحية، والمراقبة، والوصول.", clause: "5.3" },
    { cat: "Pest Control", req: "Pest Control: Documented programme to prevent access, harbourage, and proliferation.", ar: "مكافحة الآفات: برنامج موثق لمنع الدخول والمأوى والتكاثر.", clause: "7.1-7.6" },
    { cat: "Waste Management", req: "Waste Management: Programme to identify, collect, remove waste.", ar: "إدارة النفايات: برنامج للتعريف والجمع والإزالة.", clause: "8.0" },
    { cat: "Food Handling", req: "Allergen Control: Protect against cross-contact.", ar: "التحكم في مسببات الحساسية: الحماية من التلامس المتبادل.", clause: "12.2" },
    { cat: "Personal Hygiene", req: "Personal Hygiene/Behavior: Handwashing, workwear, health status.", ar: "النظافة الشخصية/السلوك: غسل اليدين، ملابس العمل، الحالة الصحية.", clause: "14.1-14.8" }
];

function renderTable() {
    const tbody = document.getElementById('auditBody');
    auditData.forEach((item, index) => {
        tbody.innerHTML += `<tr>
            <td>${item.cat}</td>
            <td>${item.req}</td>
            <td>${item.ar}</td>
            <td>
                <select class="res" onchange="calculate()">
                    <option value="0">Yes</option>
                    <option value="1">No</option>
                    <option value="2">N/A</option>
                </select>
            </td>
            <td>
                <select class="team">
                    <option value="HP">Hospitality (HP)</option>
                    <option value="CL">Cleaning (CL)</option>
                    <option value="M">Maintenance (M)</option>
                </select>
            </td>
            <td class="major-input"><input type="checkbox" class="major" onchange="calculate()" disabled></td>
            <td><textarea placeholder="Remark/Recommendation"></textarea></td>
            <td><input type="file" accept="image/*"></td>
            <td>${item.clause}</td>
        </tr>`;
    });
}

function calculate() {
    let score = 100;
    document.querySelectorAll('tr').forEach(tr => {
        const res = tr.querySelector('.res').value;
        const major = tr.querySelector('.major');
        if (res === "1") {
            major.disabled = false;
            score -= (major.checked ? 10 : 1);
        } else {
            major.disabled = true;
            major.checked = false;
        }
    });
    document.getElementById('finalScore').innerText = Math.max(0, score);
}

renderTable();

// Initialize Charts
const trendCtx = document.getElementById('trendChart').getContext('2d');
new Chart(trendCtx, { type: 'line', data: { labels: ['Audit 1', 'Audit 2', 'Audit 3'], datasets: [{ label: 'Score %', data: [100, 95, 98] }] } });

const teamCtx = document.getElementById('teamChart').getContext('2d');
new Chart(teamCtx, { type: 'bar', data: { labels: ['HP', 'CL', 'M'], datasets: [{ label: 'Performance', data: [90, 85, 95], backgroundColor: ['#008080', '#008080', '#008080'] }] } });
</script>
</body>
</html>
