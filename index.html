<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 22002-100 & 22002-2 Catering Audit</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --teal: #008080; --bg: #f9f9f9; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: var(--bg); color: var(--text); }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid var(--teal); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: var(--teal); margin-top: 0; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--teal); color: white; padding: 12px; text-align: left; }
        td { border: 1px solid #ddd; padding: 8px; vertical-align: middle; }
        select, input[type="text"], input[type="time"], input[type="number"], textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        select { appearance: none; -webkit-appearance: none; -moz-appearance: none; background: transparent; cursor: pointer; text-align-last: center; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button { background: var(--teal); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .score-green { color: #28a745; font-weight: bold; }
        .score-yellow { color: #ffc107; font-weight: bold; }
        .score-red { color: #dc3545; font-weight: bold; }
        input[type="file"] { display: none; }
        .custom-file-upload { display: inline-block; padding: 6px 12px; cursor: pointer; color: var(--teal); font-size: 1.5rem; text-align: center; width: 100%; }
        .thumbnail { max-width: 150px; max-height: 150px; display: block; margin-top: 5px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
        .chart-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .signature-section { display: flex; justify-content: space-between; margin-top: 20px; }
        .sig-box { width: 45%; border-top: 1px solid #333; padding-top: 10px; margin-top: 20px; }
        @media (max-width: 768px) { .chart-wrapper { grid-template-columns: 1fr; } }
        @media print { .no-print { display: none; } .chart-wrapper { display: block; page-break-inside: avoid; } }
    </style>
</head>
<body>

<div class="card">
    <h1>Food Safety Audit</h1>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0;">
        <div><label><strong>Date:</strong></label><input type="text" id="auditDate" placeholder="YYYY-MM-DD"></div>
        <div><label><strong>Time:</strong></label><input type="time" id="auditTime"></div>
        <div><label><strong>Location:</strong></label><input type="text" id="auditLoc" placeholder="Enter Location"></div>
    </div>
    <div style="font-size: 1.5rem; margin-top: 15px;">Score: <span id="finalScore" class="score-green">100</span>%</div>
    <div class="btn-group no-print">
        <button onclick="toggleLang()">EN / AR</button>
        <button onclick="window.print()">Print Report</button>
    </div>
</div>

<div class="card" style="overflow-x: auto;">
    <table id="auditTable">
        <thead><tr><th>Requirement</th><th>Result</th><th>Team</th><th>Major?</th><th>Finding</th><th>Image</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="card chart-wrapper">
    <div><canvas id="trendChart"></canvas></div>
    <div><canvas id="teamChart"></canvas></div>
</div>

<div class="card">
    <div class="signature-section">
        <div class="sig-box">Auditor Signature</div>
        <div class="sig-box">Manager Signature</div>
    </div>
</div>

<script>
const auditItems = [
  { category: "Food Environment", req: "Boundaries of the site/facilities: Identified and maintained.", ar: "حدود الموقع/المرافق: يجب تحديدها وصيانتها.", clause: "4.1" },
  { category: "Food Environment", req: "Environment: Consideration of potential contamination sources.", ar: "البيئة: مراعاة مصادر التلوث المحتملة.", clause: "4.2" },
  { category: "Construction", req: "Layout: Designed for purpose, maintained to avoid hazards.", ar: "البناء والتصميم: تصميم المباني للغرض من العملية.", clause: "4.3" },
  { category: "Food Handling Area", req: "Internal structures: Suitable materials, maintainable.", ar: "الهياكل الداخلية: مواد مناسبة، قابلة للصيانة.", clause: "5.2" },
  { category: "Equipment", req: "Location: Facilitate hygiene, monitoring, and access.", ar: "موقع المعدات: تسهيل الممارسات الصحية.", clause: "5.3" },
  { category: "Storage", req: "Storage: Requirements defined, protection from contamination.", ar: "التخزين: متطلبات محددة، حماية من التلوث.", clause: "5.4" },
  { category: "Utilities", req: "Water, ice and steam: Quality and quantity suitable.", ar: "المياه والثلج والبخار: جودة وكمية مناسبة.", clause: "6.2" },
  { category: "Ventilation", req: "Air and ventilation: Prevent flow from contaminated areas.", ar: "الهواء والتهوية: منع تدفق الهواء من المناطق الملوثة.", clause: "6.3" },
  { category: "Compressed Air", req: "Compressed air/gases: Appropriate, maintained.", ar: "الهواء المضغوط والغازات: مناسبة ومصانة.", clause: "6.4" },
  { category: "Light", req: "Light: Adequate for operation and inspection.", ar: "الإضاءة: كافية للتشغيل والفحص.", clause: "6.5" },
  { category: "Pest Control", req: "Pest Control: Documented programme to prevent access.", ar: "مكافحة الآفات: برنامج موثق لمنع الدخول.", clause: "7.1-7.6" },
  { category: "Waste", req: "Waste Management: Program to identify, collect, remove.", ar: "إدارة النفايات: برنامج للتعريف والجمع والإزالة.", clause: "8." },
  { category: "Equipment", req: "Equipment suitability: Hygienically designed.", ar: "ملاءمة المعدات: تصميم صحي.", clause: "9.1" },
  { category: "Maintenance", req: "Maintenance: Preventative/corrective programmes.", ar: "الصيانة: برامج وقائية/تصحيحية.", clause: "9.3" },
  { category: "Purchasing", req: "Purchasing: Supplier selection, hazard assessment.", ar: "المشتريات: اختيار الموردين، تقييم المخاطر.", clause: "10.1-10.3" },
  { category: "Storage/Transport", req: "Storage/Transport: Protection against contamination.", ar: "التخزين/النقل: الحماية من التلوث.", clause: "11.1-11.3" },
  { category: "Contamination", req: "Prevention: Systems to detect/prevent cross-contamination.", ar: "منع التلوث: أنظمة للكشف/المنع.", clause: "12.1" },
  { category: "Allergen", req: "Allergen Control: Cleaning, segregation.", ar: "التحكم في الحساسية: التنظيف والفصل.", clause: "12.2" },
  { category: "Cleaning", req: "Cleaning: Program defining what/when/who/how.", ar: "التنظيف: برنامج محدد للتنظيف.", clause: "13.1-13.3" },
  { category: "Hygiene", req: "Personal Hygiene: Handwashing, workwear, behavior.", ar: "النظافة الشخصية: غسل اليدين، ملابس العمل.", clause: "14.1-14.8" },
  { category: "Labeling", req: "Info: Adequate information for safe handling.", ar: "معلومات المنتج: معلومات كافية للتداول.", clause: "15" },
  { category: "Food Defence", req: "Defence/Fraud: Threat/Vulnerability assessments.", ar: "دفاع الغذاء: تقييم التهديدات ونقاط الضعف.", clause: "16.1-16.3" },
  { category: "Preparation", req: "Thawing/Cooking/Cooling/Service: Controlled temps.", ar: "التحضير: درجات حرارة محكومة.", clause: "17.1-17.5" }
];

let lang = 'en';
let history = { dates: ['2026-07-02'], scores: [100] };

function getCol(s) { return s >= 90 ? '#28a745' : s >= 70 ? '#ffc107' : '#dc3545'; }

function toggleLang() { lang = lang === 'en' ? 'ar' : 'en'; renderTable(); }

function renderTable() {
    const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
    auditItems.forEach((item) => {
        tbody.innerHTML += `<tr>
            <td><strong>${item.category}</strong> (Clause: ${item.clause})<br>${lang === 'en' ? item.req : item.ar}</td>
            <td><select class="res" onchange="calculate()"><option value="0">Yes</option><option value="1">No</option><option value="2">N/A</option></select></td>
            <td><select class="team" onchange="calculate()"><option>HP</option><option>CL</option><option>M</option></select></td>
            <td style="text-align: center;"><input type="checkbox" class="major" onchange="calculate()" disabled></td>
            <td><textarea rows="2"></textarea></td>
            <td><label class="custom-file-upload">📷<input type="file" accept="image/*" onchange="previewImage(this)"></label></td>
        </tr>`;
    });
}

function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const container = input.parentElement.parentElement;
            const existing = container.querySelector('img');
            if(existing) existing.remove();
            const img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'thumbnail';
            container.appendChild(img);
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function calculate() {
    let totalScore = 100;
    let teamScores = { 'HP': [], 'CL': [], 'M': [] };
    
    document.querySelectorAll('#tableBody tr').forEach(tr => {
        const resSelect = tr.querySelector('.res');
        const majorCheckbox = tr.querySelector('.major');
        const team = tr.querySelector('.team').value;
        
        let rowScore = 100;
        if (resSelect.value === "1") { 
            majorCheckbox.disabled = false;
            rowScore = majorCheckbox.checked ? 0 : 90;
            totalScore -= (majorCheckbox.checked ? 10 : 1);
        } else {
            majorCheckbox.disabled = true;
            majorCheckbox.checked = false;
        }
        teamScores[team].push(rowScore);
    });

    const finalScore = Math.max(0, totalScore);
    const scoreEl = document.getElementById('finalScore');
    scoreEl.innerText = finalScore;
    scoreEl.className = finalScore >= 90 ? 'score-green' : finalScore >= 70 ? 'score-yellow' : 'score-red';
    
    // Update Charts
    trendChart.data.datasets[0].data[trendChart.data.datasets[0].data.length-1] = finalScore;
    trendChart.data.datasets[0].borderColor = getCol(finalScore);
    
    const teamAverages = ['HP', 'CL', 'M'].map(t => teamScores[t].length ? teamScores[t].reduce((a,b)=>a+b,0)/teamScores[t].length : 100);
    teamChart.data.datasets[0].data = teamAverages;
    teamChart.data.datasets[0].backgroundColor = teamAverages.map(s => getCol(s));
    
    trendChart.update();
    teamChart.update();
}

const trendChart = new Chart(document.getElementById('trendChart').getContext('2d'), { type: 'line', data: { labels: history.dates, datasets: [{ label: 'Score (%)', data: history.scores, borderColor: '#28a745' }] }, options: { scales: { y: { min: 0, max: 100 } } } });
const teamChart = new Chart(document.getElementById('teamChart').getContext('2d'), { type: 'bar', data: { labels: ['HP', 'CL', 'M'], datasets: [{ label: 'Team Score', data: [100, 100, 100], backgroundColor: ['#28a745', '#28a745', '#28a745'] }] }, options: { scales: { y: { min: 0, max: 100 } } } });

renderTable();
</script>
</body>
</html>
