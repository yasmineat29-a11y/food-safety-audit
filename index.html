<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 22002-100 & 22002-2 Catering Audit</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --teal: #008080; --bg: #f9f9f9; --text: #333; --green: #28a745; --yellow: #ffc107; --red: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: var(--bg); color: var(--text); }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid var(--teal); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: var(--teal); margin-top: 0; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--teal); color: white; padding: 12px; text-align: left; }
        td { border: 1px solid #ddd; padding: 8px; vertical-align: middle; }
        select, input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .score-green { color: var(--green); } .score-yellow { color: var(--yellow); } .score-red { color: var(--red); }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { background: var(--teal); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .chart-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .sig-section { display: flex; justify-content: space-between; margin-top: 30px; }
        .sig-line { width: 40%; border-top: 1px solid #000; margin-top: 20px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="card">
    <h1>Food Safety Audit</h1>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
        <div><label><strong>Date:</strong></label><input type="text" id="auditDate"></div>
        <div><label><strong>Time:</strong></label><input type="time" id="auditTime"></div>
        <div><label><strong>Location:</strong></label><input type="text" id="auditLoc"></div>
    </div>
    <div style="font-size: 1.5rem; margin-top: 15px;">Score: <span id="finalScore" class="score-green">100</span>%</div>
    <div class="btn-group no-print">
        <button onclick="window.print()">Print Report</button>
    </div>
</div>

<div class="card" style="overflow-x: auto;">
    <table>
        <thead><tr><th>Clause</th><th>Requirement</th><th>Result</th><th>Team</th><th>Major?</th><th>Finding</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="card chart-wrapper">
    <canvas id="trendChart"></canvas>
    <canvas id="teamChart"></canvas>
</div>

<div class="card">
    <div class="sig-section">
        <div class="sig-line">Auditor Signature</div>
        <div class="sig-line">Manager Signature</div>
    </div>
</div>

<script>
const auditItems = [
    { clause: "4.1", req: "Boundaries of the site/facilities" },
    { clause: "4.2", req: "Environment" },
    { clause: "4.3", req: "Construction and layout" },
    { clause: "5.2", req: "Internal structures and fittings" },
    { clause: "5.3", req: "Location of equipment" },
    { clause: "5.4", req: "Storage" },
    { clause: "6.2", req: "Water, ice and steam" },
    { clause: "6.3", req: "Air and ventilation" },
    { clause: "7.1", req: "Pest control programme" },
    { clause: "8.1", req: "Waste management" },
    { clause: "9.1", req: "Equipment suitability" },
    { clause: "9.3", req: "Maintenance" },
    { clause: "10.1", req: "Management of purchased materials" },
    { clause: "11.1", req: "Storage and transport" },
    { clause: "12.1", req: "Measures for prevention of contamination" },
    { clause: "12.2", req: "Allergen management" },
    { clause: "13.1", req: "Cleaning and disinfection" },
    { clause: "14.1", req: "Personal hygiene" },
    { clause: "17.1", req: "Preparation (Catering)" }
];

function getCol(s) { return s >= 90 ? '#28a745' : s >= 70 ? '#ffc107' : '#dc3545'; }

function calculate() {
    let totalScore = 100, teamData = { 'HP': [], 'CL': [], 'M': [] };
    document.querySelectorAll('#tableBody tr').forEach(tr => {
        const res = tr.querySelector('.res').value, maj = tr.querySelector('.major'), tm = tr.querySelector('.team').value;
        let rowVal = 100;
        if (res === "1") { 
            maj.disabled = false; rowVal = maj.checked ? 0 : 90; totalScore -= (maj.checked ? 10 : 2); 
        } else { maj.disabled = true; maj.checked = false; }
        teamData[tm].push(rowVal);
    });
    const fs = Math.max(0, totalScore);
    const el = document.getElementById('finalScore');
    el.innerText = fs;
    el.className = fs >= 90 ? 'score-green' : fs >= 70 ? 'score-yellow' : 'score-red';
    
    // Update Charts
    trendChart.data.datasets[0].data = [fs];
    trendChart.data.datasets[0].borderColor = getCol(fs);
    const avg = ['HP','CL','M'].map(t => teamData[t].length ? teamData[t].reduce((a,b)=>a+b,0)/teamData[t].length : 100);
    teamChart.data.datasets[0].data = avg;
    teamChart.data.datasets[0].backgroundColor = avg.map(s => getCol(s));
    trendChart.update(); teamChart.update();
}

const tbody = document.getElementById('tableBody');
auditItems.forEach(i => tbody.innerHTML += `<tr><td>${i.clause}</td><td>${i.req}</td><td><select class="res" onchange="calculate()"><option value="0">Yes</option><option value="1">No</option></select></td><td><select class="team"><option>HP</option><option>CL</option><option>M</option></select></td><td><input type="checkbox" class="major" onchange="calculate()" disabled></td><td><textarea></textarea></td></tr>`);

const trendChart = new Chart(document.getElementById('trendChart'), { type: 'line', data: { labels: ['Current'], datasets: [{ label: 'Score (%)', data: [100], borderColor: '#28a745' }] } });
const teamChart = new Chart(document.getElementById('teamChart'), { type: 'bar', data: { labels: ['HP', 'CL', 'M'], datasets: [{ label: 'Team Avg', data: [100, 100, 100], backgroundColor: '#28a745' }] } });
</script>
</body>
</html>
