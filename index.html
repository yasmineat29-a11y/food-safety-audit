<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 22002 Audit Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #008080; color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 8px; }
        .major-input { text-align: center; }
        canvas { max-width: 400px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Food Safety Audit</h1>
    <div style="font-size: 20px; font-weight: bold; color: #008080;">Final Score: <span id="finalScore">100</span>%</div>
</div>

<div class="card">
    <table id="auditTable">
        <thead>
            <tr><th>Category</th><th>Requirement</th><th>Clause</th><th>Result</th><th>Team</th><th>Major?</th></tr>
        </thead>
        <tbody id="auditBody"></tbody>
    </table>
</div>

<script>
// Data imported from your DOCX file
const auditData = [
    { cat: "Food Environment", req: "Boundaries of the site/facilities", clause: "4.1" },
    { cat: "Food Environment", req: "Environment: Potential contamination sources", clause: "4.2" },
    { cat: "Food Environment", req: "Construction and layout", clause: "4.3" },
    { cat: "Food Handling Area", req: "General: Minimize cross-contamination", clause: "" },
    { cat: "Food Handling Area", req: "Internal structures and fittings", clause: "5.2" },
    { cat: "Food Equipment", req: "Location of equipment", clause: "5.3" },
    { cat: "Food Equipment", req: "Storage requirements", clause: "5.4" },
    { cat: "Food contact liquids", req: "Water, ice, steam quality", clause: "6.2" },
    { cat: "Ventillation", req: "Air flow and ventilation", clause: "6.3" },
    { cat: "Food contact gasses", req: "Compressed air/gases", clause: "6.4" },
    { cat: "Light Facilities", req: "Adequate lighting", clause: "6.5" },
    { cat: "Pest Control", req: "Pest Control Programme", clause: "7.1-7.6" },
    { cat: "Waste Management", req: "Waste identification/removal", clause: "8" },
    { cat: "Waste Management", req: "Recycling/Reuse", clause: "8.2" },
    { cat: "Waste Management", req: "Waste containers", clause: "8.3" },
    { cat: "Food Equipment", req: "Equipment suitability", clause: "9.1" },
    { cat: "Food Equipment", req: "Equipment capability", clause: "9.2" },
    { cat: "Food Equipment", req: "Maintenance programmes", clause: "9.3" },
    { cat: "Purchasing/Receiving", req: "Supplier selection/inspection", clause: "10.1-10.3" },
    { cat: "Food Storage", req: "Storage/Dispatch/Transport", clause: "11.1-11.3" },
    { cat: "Food Handling", req: "Prevention of contamination", clause: "12.1" },
    { cat: "Food Handling", req: "Allergen Control", clause: "12.2" },
    { cat: "Cleaning", req: "Cleaning/Disinfection programme", clause: "13.1-13.3" },
    { cat: "Personal Hygiene", req: "Hygiene/Behavior/Handwashing", clause: "14.1-14.8" },
    { cat: "Food Labeling", req: "Product/Consumer Info", clause: "15" },
    { cat: "Food Fraud/Defence", req: "Threat/Vulnerability assessments", clause: "16.1-16.3" },
    { cat: "Temp Control", req: "Preparation - Thawing", clause: "17.1" },
    { cat: "Temp Control", req: "Preparation - Cooking", clause: "17.2" },
    { cat: "Temp Control", req: "Preparation - Cooling", clause: "17.3" },
    { cat: "Temp Control", req: "Preparation - Reheating", clause: "17.4" },
    { cat: "Temp Control", req: "Preparation - Service", clause: "17.5" }
];

function renderTable() {
    const tbody = document.getElementById('auditBody');
    auditData.forEach(item => {
        tbody.innerHTML += `<tr>
            <td>${item.cat}</td><td>${item.req}</td><td>${item.clause}</td>
            <td><select class="res" onchange="calculate()"><option value="0">Yes</option><option value="1">No</option><option value="2">N/A</option></select></td>
            <td><select><option>HP</option><option>CL</option><option>M</option></select></td>
            <td class="major-input"><input type="checkbox" class="major" onchange="calculate()" disabled></td>
        </tr>`;
    });
}

function calculate() {
    let score = 100;
    document.querySelectorAll('tr').forEach(tr => {
        const res = tr.querySelector('.res').value;
        const major = tr.querySelector('.major');
        if (res === "1") {
            major.disabled = false;
            score -= (major.checked ? 10 : 1);
        } else {
            major.disabled = true; major.checked = false;
        }
    });
    document.getElementById('finalScore').innerText = Math.max(0, score);
}

renderTable();
</script>
</body>
</html>
