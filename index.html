<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 22002-100 & 22002-2 Catering Audit</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --teal: #008080; --bg: #f9f9f9; --text: #333; --green: #28a745; --yellow: #ffc107; --red: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: var(--bg); color: var(--text); }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid var(--teal); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: var(--teal); margin-top: 0; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--teal); color: white; padding: 12px; text-align: left; }
        td { border: 1px solid #ddd; padding: 8px; vertical-align: middle; }
        select, input[type="text"], input[type="time"], input[type="number"], textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { background: var(--teal); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .score-green { color: var(--green); font-weight: bold; }
        .score-yellow { color: var(--yellow); font-weight: bold; }
        .score-red { color: var(--red); font-weight: bold; }
        .sig-box { display: flex; justify-content: space-between; margin-top: 40px; border-top: 2px solid #ccc; padding-top: 10px; }
        .sig-line { width: 45%; border-bottom: 1px solid #000; height: 40px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="card">
    <h1>ISO 22002-100 & 22002-2 Audit</h1>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0;">
        <div><label><strong>Date:</strong></label><input type="text" id="auditDate"></div>
        <div><label><strong>Time:</strong></label><input type="time" id="auditTime"></div>
        <div><label><strong>Location:</strong></label><input type="text" id="auditLoc"></div>
    </div>
    <div style="font-size: 1.5rem; margin-top: 15px;">Score: <span id="finalScore" class="score-green">100</span>%</div>
    <div class="btn-group no-print">
        <button onclick="window.print()">Print Report</button>
    </div>
</div>

<div class="card" style="overflow-x: auto;">
    <table id="auditTable">
        <thead><tr><th>Clause</th><th>Requirement</th><th>Result</th><th>Major?</th><th>Finding</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="card">
    <h3>Signatures</h3>
    <div class="sig-box">
        <div>Auditor Signature: <div class="sig-line"></div></div>
        <div>Manager Signature: <div class="sig-line"></div></div>
    </div>
</div>

<script>
const auditItems = [
    { clause: "4.1", req: "Boundaries of the site/facilities" },
    { clause: "4.2", req: "Environment" },
    { clause: "4.3", req: "Construction and layout" },
    { clause: "5.1", req: "Design and layout: General" },
    { clause: "5.2", req: "Internal structures and fittings" },
    { clause: "5.3", req: "Location of equipment" },
    { clause: "5.4", req: "Storage of food, packaging, ingredients and chemicals" },
    { clause: "6.2", req: "Water, ice and steam" },
    { clause: "6.3", req: "Air and ventilation" },
    { clause: "7.1-7.6", req: "Pest control" },
    { clause: "8.1-8.3", req: "Waste, FLW management and recycling" },
    { clause: "9.1-9.3", req: "Equipment suitability and maintenance" },
    { clause: "10.1-10.3", req: "Management of purchased materials" },
    { clause: "11.1-11.3", req: "Storage and transport" },
    { clause: "12.1-12.2", req: "Measures for prevention of contamination & Allergen control" },
    { clause: "13.1-13.3", req: "Cleaning and disinfection" },
    { clause: "14.1-14.8", req: "Personal hygiene and employee facilities" },
    { clause: "15", req: "Product and consumer information" },
    { clause: "16.1-16.3", req: "Food fraud and food defence" },
    { clause: "17", req: "Preparation (ISO 22002-2)" }
];

function renderTable() {
    const tbody = document.getElementById('tableBody');
    auditItems.forEach((item) => {
        tbody.innerHTML += `<tr>
            <td>${item.clause}</td>
            <td>${item.req}</td>
            <td>
                <select class="res" onchange="calculate()">
                    <option value="pass">Yes</option>
                    <option value="fail">No</option>
                    <option value="na">N/A</option>
                </select>
            </td>
            <td><input type="checkbox" class="major" onchange="calculate()" disabled></td>
            <td><textarea rows="1"></textarea></td>
        </tr>`;
    });
}

function calculate() {
    let score = 100;
    document.querySelectorAll('tr').forEach(tr => {
        const res = tr.querySelector('.res').value;
        const major = tr.querySelector('.major');
        
        if (res === "fail") {
            major.disabled = false;
            score -= (major.checked ? 10 : 2);
        } else {
            major.disabled = true;
            major.checked = false;
        }
    });

    const final = Math.max(0, score);
    const scoreSpan = document.getElementById('finalScore');
    scoreSpan.innerText = final;
    
    // Set Color Class
    scoreSpan.className = (final >= 90) ? 'score-green' : (final >= 70) ? 'score-yellow' : 'score-red';
}

renderTable();
</script>
</body>
</html>
