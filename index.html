<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 22002-100 & 22002-2 Catering Audit</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --teal: #008080; --bg: #f9f9f9; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: var(--bg); color: var(--text); }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid var(--teal); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: var(--teal); margin-top: 0; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--teal); color: white; padding: 12px; text-align: left; }
        td { border: 1px solid #ddd; padding: 8px; vertical-align: middle; }
        
        select, input[type="text"], input[type="time"], input[type="number"], textarea { 
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        select { 
            appearance: none; -webkit-appearance: none; -moz-appearance: none; 
            background: transparent; cursor: pointer; text-align-last: center; 
        }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button { background: var(--teal); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .score-green { color: #28a745; font-weight: bold; }
        .score-yellow { color: #ffc107; font-weight: bold; }
        .score-red { color: #dc3545; font-weight: bold; }
        
        input[type="file"] { display: none; }
        .custom-file-upload { display: inline-block; padding: 6px 12px; cursor: pointer; color: var(--teal); font-size: 1.5rem; text-align: center; width: 100%; }
        .thumbnail { max-width: 150px; max-height: 150px; display: block; margin-top: 5px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
        
        .chart-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .chart-wrapper { grid-template-columns: 1fr; } }
        @media print { .no-print { display: none; } .chart-wrapper { display: block; page-break-inside: avoid; } }
    </style>
</head>
<body>

<div class="card">
    <h1>Food Safety Audit</h1>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0;">
        <div><label><strong>Date:</strong></label><input type="text" id="auditDate" placeholder="YYYY-MM-DD"></div>
        <div><label><strong>Time:</strong></label><input type="time" id="auditTime"></div>
        <div><label><strong>Location:</strong></label><input type="text" id="auditLoc" placeholder="Enter Location"></div>
    </div>
    <div style="font-size: 1.5rem; margin-top: 15px;">Score: <span id="finalScore" class="score-green">100</span>%</div>
    <div class="btn-group no-print">
        <button onclick="toggleLang()">EN / AR</button>
        <button onclick="window.print()">Print Report</button>
    </div>
</div>

<div class="card" style="overflow-x: auto;">
    <table id="auditTable">
        <thead><tr><th>Requirement</th><th>Result</th><th>Team</th><th>Major?</th><th>Finding</th><th>Image</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="card chart-wrapper">
    <div><canvas id="trendChart"></canvas></div>
    <div><canvas id="teamChart"></canvas></div>
</div>

<div class="card no-print">
    <h3>Update History</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center;">
        <input type="text" id="histDate" placeholder="YYYY-MM-DD" style="flex: 1;">
        <input type="number" id="histScore" placeholder="Score (%)" style="flex: 1;">
        <button onclick="addHistory()">Add Entry</button>
    </div>
</div>

<script>
const auditItems = [
    { category: "Food Environment", requirement_content: "Boundaries of the site/facilities: Identified and maintained.", arabic_translation: "حدود الموقع/المرافق: يجب تحديدها وصيانتها.", source: "ISO 22002-100", clause: "4.1" },
    { category: "Food Handling Area", requirement_content: "General: Facilities designed to minimize cross-contamination.", arabic_translation: "عام: تصميم المرافق لتقليل التلوث المتبادل.", source: "ISO", clause: "" },
    { category: "Pest Control", requirement_content: "Pest Control: Documented programme to prevent access.", arabic_translation: "مكافحة الآفات: برنامج موثق لمنع الدخول.", source: "ISO 22002-100", clause: "7.1" }
];

let lang = 'en';
let history = { dates: ['2026-07-02'], scores: [100] };

function toggleLang() { lang = lang === 'en' ? 'ar' : 'en'; renderTable(); }

function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    auditItems.forEach((item) => {
        tbody.innerHTML += `<tr>
            <td><strong>${item.category}</strong><br>${lang === 'en' ? item.requirement_content : item.arabic_translation}</td>
            <td><select class="res" onchange="calculate()"><option value="0">Yes</option><option value="1">No</option><option value="2">N/A</option></select></td>
            <td><select class="team" onchange="calculate()"><option>Kitchen</option><option>Cleaning</option><option>Maintenance</option></select></td>
            <td style="text-align: center;"><input type="checkbox" class="major" onchange="calculate()" disabled></td>
            <td><textarea rows="2"></textarea></td>
            <td><label class="custom-file-upload">📷<input type="file" accept="image/*" onchange="previewImage(this)"></label></td>
        </tr>`;
    });
}

function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const container = input.parentElement.parentElement;
            const existing = container.querySelector('img');
            if(existing) existing.remove();
            const img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'thumbnail';
            container.appendChild(img);
        };
        reader.readAsDataURL(input.files[0]);
    }
}

// Chart Logic
const trendCtx = document.getElementById('trendChart').getContext('2d');
let trendChart = new Chart(trendCtx, { type: 'line', data: { labels: history.dates, datasets: [{ label: 'Score (%)', data: history.scores, borderColor: '#008080' }] }, options: { scales: { y: { min: 0, max: 100 } } } });

const teamCtx = document.getElementById('teamChart').getContext('2d');
let teamChart = new Chart(teamCtx, { type: 'bar', data: { labels: ['Kitchen', 'Cleaning', 'Maintenance'], datasets: [{ label: 'Team Score', data: [100, 100, 100], backgroundColor: '#008080' }] }, options: { scales: { y: { min: 0, max: 100 } } } });

function calculate() {
    let score = 100;
    document.querySelectorAll('tr').forEach(tr => {
        const res = tr.querySelector('.res').value;
        const major = tr.querySelector('.major');
        if (res === "1") { major.disabled = false; score -= (major.checked ? 10 : 1); }
        else { major.disabled = true; major.checked = false; }
    });
    document.getElementById('finalScore').innerText = Math.max(0, score);
    updateCharts(Math.max(0, score));
}

function updateCharts(score) {
    history.scores[history.scores.length - 1] = score;
    trendChart.update();
    teamChart.update();
}

function addHistory() {
    const d = document.getElementById('histDate').value;
    const s = document.getElementById('histScore').value;
    if(d && s) { history.dates.push(d); history.scores.push(parseInt(s)); trendChart.update(); }
}

renderTable();
</script>
</body>
</html>
