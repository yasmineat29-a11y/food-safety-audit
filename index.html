<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 22002-2:2025 Catering Audit</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --teal: #008080; --bg: #f9f9f9; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: var(--bg); color: var(--text); }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid var(--teal); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: var(--teal); margin-top: 0; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--teal); color: white; padding: 12px; text-align: left; }
        td { border: 1px solid #ddd; padding: 8px; vertical-align: middle; }
        select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        input[type="text"], input[type="date"], input[type="time"], input[type="number"], textarea { width: 100%; padding: 5px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button { background: var(--teal); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .score-green { color: #28a745; font-weight: bold; }
        .score-yellow { color: #ffc107; font-weight: bold; }
        .score-red { color: #dc3545; font-weight: bold; }
        .thumbnail { max-width: 150px; max-height: 150px; display: block; margin-top: 5px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
        .chart-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .chart-wrapper { grid-template-columns: 1fr; } }
        @media print { .no-print { display: none; } .chart-wrapper { display: block; page-break-inside: avoid; } canvas { max-width: 100%; margin-bottom: 20px; } }
    </style>
</head>
<body>

<div class="card">
    <h1>Food Safety Audit (ISO 22002-2:2025 Catering)</h1>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0;">
        <div>
            <label><strong>Date:</strong></label>
            <input type="date" id="auditDate">
        </div>
        <div>
            <label><strong>Time:</strong></label>
            <input type="time" id="auditTime">
        </div>
        <div>
            <label><strong>Location/Site Name:</strong></label>
            <input type="text" id="auditLoc" placeholder="Enter Location">
        </div>
    </div>

    <div style="font-size: 1.5rem; margin-top: 15px;">Score: <span id="finalScore" class="score-green">100</span>%</div>

    <div class="btn-group no-print">
        <button onclick="toggleLang()">EN / AR</button>
        <button onclick="window.print()">Print Report</button>
    </div>
</div>

<div class="card" style="overflow-x: auto;">
    <table id="auditTable">
        <thead>
            <tr>
                <th>Requirement Content</th>
                <th style="width: 100px;">Result</th>
                <th style="width: 150px;">Team</th>
                <th style="width: 80px;">Major? (-10)</th>
                <th>Finding</th>
                <th style="width: 180px;">Image</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="card chart-wrapper">
    <div>
        <canvas id="trendChart"></canvas>
    </div>
    <div>
        <canvas id="teamChart"></canvas>
    </div>
</div>

<div class="card no-print">
    <h3>Update History (Previous Audits)</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center;">
        <input type="text" id="histDate" placeholder="Date (e.g., 2026-07-02)" style="flex: 1;">
        <input type="number" id="histScore" placeholder="Score (%)" style="flex: 1;">
        <button onclick="addHistory()">Add Entry</button>
    </div>
</div>

<script>
// Requirements based strictly on ISO 22002-2:2025 (Catering) and ISO 22002-100:2025
const auditItems = [
    [span_0](start_span){en: "Boundaries & Environment: Facilities designed to minimize contamination. Drainage systems prevent contamination risk.[span_0](end_span)", ar: "الحدود والبيئة: تصميم المرافق لتقليل التلوث. أنظمة الصرف تمنع خطر التلوث."},
    {en: "Utilities (Water/Ice): Potable water supply adequate. [span_1](start_span)[span_2](start_span)Ice used in food contact is protected from contamination.[span_1](end_span)[span_2](end_span)", ar: "المرافق (الماء/الثلج): إمدادات مياه صالحة للشرب مناسبة. حماية الثلج الملامس للغذاء من التلوث."},
    {en: "Pest Control: Documented program in place. [span_3](start_span)[span_4](start_span)Traps/detectors prevent product contamination.[span_3](end_span)[span_4](end_span)", ar: "مكافحة الآفات: برنامج موثق. الفخاخ/أجهزة الكشف تمنع تلوث المنتج."},
    {en: "Waste Management: Collecting bins in prep areas have hands-free covers. [span_5](start_span)[span_6](start_span)Grease traps located outside food prep areas.[span_5](end_span)[span_6](end_span)", ar: "إدارة النفايات: سلال التجميع في مناطق التحضير لها أغطية تفتح بدون لمس. مصائد الدهون خارج مناطق التحضير."},
    [span_7](start_span){en: "Used Oil: Used oil and cooking fat stored in suitably identified covered containers until removal.[span_7](end_span)", ar: "الزيت المستعمل: تخزين الزيت ودهون الطبخ المستعملة في حاويات مغطاة ومحددة حتى إزالتها."},
    {en: "Equipment: Portable equipment (spoons, pots) protected from contamination. [span_8](start_span)[span_9](start_span)Food-grade lubricants used.[span_8](end_span)[span_9](end_span)", ar: "المعدات: حماية المعدات المحمولة (ملاعق، أواني) من التلوث. استخدام زيوت تشحيم آمنة غذائياً."},
    {en: "Allergen Control: Segregation and/or dedicated tools used. [span_10](start_span)[span_11](start_span)Allergen information available to consumers.[span_10](end_span)[span_11](end_span)", ar: "التحكم في مسببات الحساسية: العزل و/أو استخدام أدوات مخصصة. توفير معلومات الحساسية للمستهلكين."},
    {en: "Hygiene & Clothing: Aprons not washed/dried in prep areas. Masks used if necessary. [span_12](start_span)[span_13](start_span)Hair enclosed.[span_12](end_span)[span_13](end_span)", ar: "النظافة والملابس: عدم غسل/تجفيف المرايل في مناطق التحضير. استخدام الكمامات عند الضرورة. تغطية الشعر بالكامل."},
    {en: "Handwashing & Gloves: Hands washed at different prep stages. Torn gloves discarded. [span_14](start_span)[span_15](start_span)Gloves do not replace handwashing.[span_14](end_span)[span_15](end_span)", ar: "غسل اليدين والقفازات: غسل اليدين في مراحل التحضير المختلفة. التخلص من القفازات الممزقة. القفازات لا تغني عن غسل اليدين."},
    [span_16](start_span){en: "Personnel Behaviour: Personal belongings (clothes, office materials) not placed in food storage/handling areas.[span_16](end_span)", ar: "سلوك الموظفين: عدم وضع المتعلقات الشخصية (ملابس، أدوات مكتبية) في مناطق التخزين/التحضير."},
    {en: "Preparation (Thawing & Cooling): Thawed food not refrozen. [span_17](start_span)[span_18](start_span)Cooked food cooled to 10°C within 2 hours.[span_17](end_span)[span_18](end_span)", ar: "التحضير (الإذابة والتبريد): عدم إعادة تجميد الأغذية المذابة. تبريد الأكل المطبوخ إلى 10 درجات مئوية خلال ساعتين."},
    {en: "Reheating & Oil: Reheated food reaches 75°C within 1 hour. [span_19](start_span)[span_20](start_span)Cooking oil not heated above 180°C.[span_19](end_span)[span_20](end_span)", ar: "إعادة التسخين والزيت: وصول الأكل المعاد تسخينه لـ 75 درجة مئوية خلال ساعة. عدم تسخين زيت الطبخ فوق 180 درجة مئوية."},
    {en: "Food Service: Food temps kept ≤4°C or ≥63°C. [span_21](start_span)[span_22](start_span)Employees handling payments do not simultaneously handle food.[span_21](end_span)[span_22](end_span)", ar: "تقديم الطعام: درجات حرارة الأكل 4 مئوية أو أقل، أو 63 مئوية أو أعلى. موظفو الدفع لا يلمسون الطعام في نفس الوقت."},
    [span_23](start_span)[span_24](start_span){en: "Food Defence & Fraud: Threat and vulnerability assessments documented and mitigation plans implemented.[span_23](end_span)[span_24](end_span)", ar: "الدفاع عن الغذاء والاحتيال: توثيق تقييمات التهديدات ونقاط الضعف وتنفيذ خطط التخفيف."}
];

let lang = 'en';
let history = { dates: ['Initial'], scores: [100] };

function toggleLang() {
    lang = lang === 'en' ? 'ar' : 'en';
    renderTable();
}

function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    auditItems.forEach((item, index) => {
        tbody.innerHTML += `<tr>
            <td>${item[lang]}</td>
            <td>
                <select class="res" onchange="calculate()">
                    <option value="0">Yes</option>
                    <option value="1">No</option>
                    <option value="2">N/A</option>
                </select>
            </td>
            <td>
                <select class="team" onchange="calculate()">
                    <option>Kitchen Operations</option>
                    <option>Cleaning</option>
                    <option>Maintenance</option>
                </select>
            </td>
            <td style="text-align: center;">
                <input type="checkbox" class="major" onchange="calculate()" disabled>
            </td>
            <td><textarea rows="3" placeholder="Notes..."></textarea></td>
            <td><input type="file" accept="image/*" onchange="previewImage(this)"></td>
        </tr>`;
    });
}

function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            // Remove existing thumbnail if present
            const existingImg = input.parentElement.querySelector('img');
            if(existingImg) existingImg.remove();
            
            const img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'thumbnail';
            input.parentElement.appendChild(img);
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function getColor(score) {
    if (score >= 90) return '#28a745'; // Green
    if (score >= 70) return '#ffc107'; // Yellow
    return '#dc3545'; // Red
}

function calculate() {
    let score = 100;
    
    document.querySelectorAll('tr').forEach(tr => {
        const resSelect = tr.querySelector('.res');
        const majorCheck = tr.querySelector('.major');
        
        if (!resSelect || !majorCheck) return;

        // Logic for Major checkbox
        if (resSelect.value === "1") {
            majorCheck.disabled = false;
            score -= majorCheck.checked ? 10 : 1;
        } else {
            majorCheck.disabled = true;
            majorCheck.checked = false;
            // "0" (Yes) and "2" (N/A) deduct 0 points
        }
    });
    
    score = Math.max(0, score);
    
    let el = document.getElementById('finalScore');
    el.innerText = score;
    el.className = score >= 90 ? 'score-green' : (score >= 70 ? 'score-yellow' : 'score-red');
    
    updateCharts(score);
}

function addHistory() {
    const dateVal = document.getElementById('histDate').value;
    const scoreVal = document.getElementById('histScore').value;
    if(dateVal && scoreVal) {
        history.dates.push(dateVal);
        history.scores.push(parseInt(scoreVal));
        document.getElementById('histDate').value = '';
        document.getElementById('histScore').value = '';
        calculate(); // This triggers updateCharts automatically
    }
}

// Chart Initialization
const ctx1 = document.getElementById('trendChart').getContext('2d');
let trendChart = new Chart(ctx1, { 
    type: 'line', 
    data: { 
        labels: history.dates, 
        datasets: [{ 
            label: 'Score Trend (%)', 
            data: history.scores, 
            borderColor: '#333',
            borderWidth: 2,
            pointBackgroundColor: [],
            pointRadius: 6
        }] 
    },
    options: { scales: { y: { min: 0, max: 100 } } }
});

const ctx2 = document.getElementById('teamChart').getContext('2d');
let teamChart = new Chart(ctx2, { 
    type: 'bar', 
    data: { 
        labels: ['Kitchen Operations', 'Cleaning', 'Maintenance'], 
        datasets: [{ 
            label: 'Team Compliance Score', 
            data: [100, 100, 100], 
            backgroundColor: [] 
        }] 
    },
    options: { scales: { y: { min: 0, max: 100 } } }
});

function updateCharts(currentScore) {
    // Update Line Chart Colors
    let pointColors = history.scores.map(s => getColor(s));
    // Ensure the last point reflects the current live score if no new history is added
    if (history.scores.length === 1) {
        history.scores[0] = currentScore;
        pointColors[0] = getColor(currentScore);
    }
    
    trendChart.data.labels = history.dates;
    trendChart.data.datasets[0].data = history.scores;
    trendChart.data.datasets[0].pointBackgroundColor = pointColors;
    trendChart.update();

    // Calculate Team Scores
    let teams = { 'Kitchen Operations': 100, 'Cleaning': 100, 'Maintenance': 100 };
    let itemCounts = { 'Kitchen Operations': 0, 'Cleaning': 0, 'Maintenance': 0 };
    
    document.querySelectorAll('tr').forEach(tr => {
        const teamSelect = tr.querySelector('.team');
        const resSelect = tr.querySelector('.res');
        const majorCheck = tr.querySelector('.major');
        
        if(!teamSelect || !resSelect) return;
        
        const team = teamSelect.value;
        const res = resSelect.value;
        const major = majorCheck.checked;
        
        itemCounts[team]++;
        if (res === "1") {
            teams[team] -= major ? 10 : 1;
        }
    });

    // Ensure scores don't drop below 0
    let kScore = Math.max(0, teams['Kitchen Operations']);
    let cScore = Math.max(0, teams['Cleaning']);
    let mScore = Math.max(0, teams['Maintenance']);

    let teamScores = [kScore, cScore, mScore];
    let teamColors = teamScores.map(s => getColor(s));

    teamChart.data.datasets[0].data = teamScores;
    teamChart.data.datasets[0].backgroundColor = teamColors;
    teamChart.update();
}

// Initial render
renderTable();
calculate();
</script>
</body>
</html>
