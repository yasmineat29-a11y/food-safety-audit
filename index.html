<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ISO 22002-2:2025 Audit Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .thumbnail { max-width: 50px; cursor: pointer; }
        .no-print { margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>ISO 22002-2:2025 Audit</h1>
    <div style="display: flex; gap: 10px;">
        <input type="date" id="date"> <input type="time" id="time"> <input type="text" id="loc" placeholder="Location">
    </div>
    <h2>Current Score: <span id="score">100</span>%</h2>
</div>

<table id="auditTable">
    <thead>
        <tr><th>Requirement</th><th>Result</th><th>Team</th><th>Major?</th><th>Finding</th><th>Img</th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<div class="card">
    <canvas id="teamChart"></canvas>
    <h3>Update History</h3>
    <input type="text" id="hDate" placeholder="Date"> <input type="number" id="hScore" placeholder="Score">
    <button onclick="addHistory()">Add Entry</button>
    <canvas id="trendChart"></canvas>
</div>

<script>
const items = ["Boundaries", "Internal Structures", "Utilities", "Pest Control", "Waste", "Equipment", "Purchased Materials", "Allergens", "Hygiene", "Preparation", "Food Defence"];
const tbody = document.getElementById('tableBody');

items.forEach(item => {
    tbody.innerHTML += `<tr>
        <td>${item}</td>
        <td><select class="res" onchange="update()"><option value="0">Yes</option><option value="1">No</option></select></td>
        <td><select class="team"><option>Cleaning</option><option>Kitchen</option></select></td>
        <td><input type="checkbox" class="major" disabled onchange="update()"></td>
        <td><input type="text"></td>
        <td><input type="file" onchange="readImg(this)"></td>
    </tr>`;
});

function readImg(input) {
    if (input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => input.parentElement.innerHTML = `<img src="${e.target.result}" class="thumbnail" onclick="window.open(this.src)">`;
        reader.readAsDataURL(input.files[0]);
    }
}

function update() {
    let score = 100;
    document.querySelectorAll('tr').forEach(tr => {
        const res = tr.querySelector('.res').value;
        const major = tr.querySelector('.major');
        major.disabled = (res === "0");
        if(res === "0") major.checked = false;
        if(res === "1") score -= (major.checked ? 10 : 1);
    });
    document.getElementById('score').innerText = Math.max(0, score);
    updateCharts();
}

let history = { dates: [], scores: [] };
function addHistory() {
    history.dates.push(document.getElementById('hDate').value);
    history.scores.push(document.getElementById('hScore').value);
    updateCharts();
}

const teamChart = new Chart(document.getElementById('teamChart'), { type: 'bar', data: { labels: ['Cleaning', 'Kitchen'], datasets: [{ label: 'Compliance', data: [100, 100] }] } });
const trendChart = new Chart(document.getElementById('trendChart'), { type: 'line', data: { labels: history.dates, datasets: [{ label: 'History', data: history.scores }] } });

function updateCharts() {
    trendChart.data.labels = history.dates;
    trendChart.data.datasets[0].data = history.scores;
    trendChart.update();
}
</script>
</body>
</html>
